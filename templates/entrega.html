{% load static %}
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GekkoTeca - Acompanhar Pedido</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .mobile-content::-webkit-scrollbar { display: none; }
        .mobile-content { -ms-overflow-style: none; scrollbar-width: none; background-color: #f0f4f8; }
        
        /* Fundo do mapa com imagem real */
        .fake-map {
            /* Replace dot pattern with a map image */
            background-image: url("{% static 'IMG/map.png' %}"); /* Assume que salvou a imagem como map.png na pasta static/IMG/ */
            background-size: cover;
            background-position: center;
            position: relative;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Animação do estafeta no mapa */
        @keyframes drive {
            0% { left: 20%; top: 30%; }
            100% { left: 70%; top: 60%; }
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Animação da barra de progresso (10 segundos) */
        @keyframes loadingBar {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body class="home-body">

    <div class="mobile-simulator">
        <div class="mobile-content" style="display: flex; flex-direction: column; padding: 0; height: 100%; position: relative;">

            <header style="position: absolute; top: 0; left: 0; width: 100%; padding: 1.5rem; display: flex; align-items: center; z-index: 10;">
                <div style="background: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    <a href="{% url 'home' %}" style="color: #8bc34a; text-decoration: none; font-size: 1.5rem; line-height: 1; margin-bottom: 2px;">&#8592;</a>
                </div>
                <h1 style="color: #2c2c2c; font-size: 1.1rem; margin: 0; font-weight: 600; width: 100%; text-align: center; padding-right: 40px; text-shadow: 0 0 10px white;">Acompanhar pedido</h1>
            </header>

            <div class="fake-map">
                <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" preserveAspectRatio="none">
                    <path d="M 20% 30% Q 50% 30% 70% 60%" stroke="#8bc34a" stroke-width="4" stroke-dasharray="8 8" fill="none" />
                </svg>

                <div style="position: absolute; left: 20%; top: 30%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center;">
                    <div style="width: 45px; height: 45px; background: white; border: 3px solid #0a2e1f; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2;">
                        <img src="{% static 'IMG/livraria1.png' %}" alt="Livraria" style="width: 30px; border-radius: 50%;">
                    </div>
                </div>

                <div style="position: absolute; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; animation: drive 10s linear forwards;">
                    <div style="background: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: #2c2c2c; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 0.5rem;">
                        15-20 min
                    </div>
                    <div style="width: 40px; height: 40px; background: #8bc34a; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; z-index: 2; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
                        🛵
                    </div>
                </div>
            </div>

            <div style="background: white; border-radius: 24px 24px 0 0; padding: 1.5rem; box-shadow: 0 -4px 15px rgba(0,0,0,0.08); position: relative; z-index: 10; margin-top: -20px;">
                
                <div style="width: 40px; height: 4px; background: #e0e0e0; border-radius: 2px; margin: 0 auto 1.5rem;"></div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div style="width: 50px; height: 50px; background-color: #0a2e1f; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                            <img src="{% static 'IMG/livraria1.png' %}" alt="Livraria" style="width: 40px; border-radius: 50%;">
                        </div>
                        <div>
                            <h2 style="font-size: 1rem; margin: 0; color: #2c2c2c; font-weight: 600;">Livraria Juquinha</h2>
                            <span style="font-size: 0.8rem; color: #8bc34a; font-weight: 600;">⭐ 4,9</span>
                        </div>
                    </div>
                    <div style="text-align: right;">
                        <span style="font-size: 0.7rem; color: #666; display: block;">Tempo de entrega</span>
                        <span style="font-size: 0.9rem; font-weight: 600; color: #2c2c2c;">15-20 min</span>
                    </div>
                </div>

                <div style="background: #f8f9fa; border-radius: 16px; padding: 1rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; border: 1px solid #eee;">
                    <div style="display: flex; align-items: center; gap: 1rem;">
                        <div style="width: 45px; height: 45px; background: #ddd; border-radius: 50%; overflow: hidden;">
                            <img src="{% static 'IMG/treecko.png' %}" alt="Bina" style="width: 100%; height: 100%; object-fit: cover; background: #e2e8f0;">
                        </div>
                        <div>
                            <h3 style="font-size: 0.9rem; margin: 0; color: #2c2c2c; font-weight: 600; display: flex; align-items: center; gap: 0.5rem;">
                                Bina <span style="font-size: 0.75rem; color: #8bc34a;">⭐ 4,9</span>
                            </h3>
                            <p style="font-size: 0.75rem; color: #666; margin: 0; display: flex; align-items: center; gap: 0.3rem;">
                                🛵 B1N-A123
                            </p>
                        </div>
                    </div>
                    <div style="width: 40px; height: 40px; background: #e8f5e9; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                        <span style="color: #4caf50; font-size: 1.2rem;">📞</span>
                    </div>
                </div>

                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <div style="display: flex; align-items: center; gap: 0.8rem;">
                            <div style="width: 32px; height: 32px; background: #8bc34a; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">
                                ✓
                            </div>
                            <div>
                                <h3 style="font-size: 0.95rem; margin: 0; color: #2c2c2c; font-weight: 600;" id="status-title">Pedido a caminho</h3>
                            </div>
                        </div>
                        <span style="font-size: 0.9rem; font-weight: 600; color: #2c2c2c;" id="status-time">12 min</span>
                    </div>
                    
                    <div style="background-color: #eee; height: 4px; border-radius: 2px; overflow: hidden; margin-top: 1rem;">
                        <div style="background-color: #8bc34a; height: 100%; width: 0%; animation: loadingBar 10s linear forwards;"></div>
                    </div>
                </div>

            </div>
        </div> 

        <div id="delivery-success-popup" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;">
            <div style="background: white; padding: 2.5rem 2rem; border-radius: 16px; text-align: center; width: 85%; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: popIn 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);">
                <div style="font-size: 4rem; margin-bottom: 1rem; line-height: 1;">📖</div>
                <h3 style="color: #2c2c2c; margin-bottom: 0.5rem; font-weight: 700; font-size: 1.3rem;">Entrega Concluída!</h3>
                <p style="color: #666; font-size: 0.9rem; line-height: 1.4; margin-bottom: 1.5rem;">O Bina chegou ao destino com o seu livro. Desejamos-lhe uma excelente leitura!</p>
                
                <button id="btn-voltar" style="width: 100%; background-color: #8bc34a; color: white; border: none; padding: 0.8rem; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer;">
                    Voltar ao Início
                </button>
            </div>
        </div>

    </div> 

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const popup = document.getElementById('delivery-success-popup');
            const btnVoltar = document.getElementById('btn-voltar');
            const statusTitle = document.getElementById('status-title');
            const statusTime = document.getElementById('status-time');

            // Simula o tempo a diminuir a meio da animação
            setTimeout(() => {
                statusTitle.innerText = "Quase a chegar...";
                statusTime.innerText = "2 min";
            }, 5000); // Aos 5 segundos

            // Dispara o Pop-up de conclusão aos 10 segundos
            setTimeout(() => {
                popup.style.display = 'flex';
            }, 10000);

            // Ação do botão para voltar à Home
            btnVoltar.addEventListener('click', () => {
                window.location.href = "{% url 'home' %}";
            });
        });
    </script>
</body>
</html>
