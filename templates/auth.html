{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GekkoTeca - Acesso</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Oculta a barra de scroll */
        .mobile-content::-webkit-scrollbar { display: none; }
        .mobile-content { -ms-overflow-style: none; scrollbar-width: none; }

        /* Fundo verde e centralização inspirados no protótipo */
        .auth-mobile-bg {
            background-color: #8bc34a; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2.5rem;
            height: 100%;
        }

        .auth-logo {
            width: 250px;
            margin: 0;
        }

        .auth-logo-wrapper {
            background-color: #2e7d32; 
            padding: 2.5rem; 
            border-radius: 20px; 
            display: flex; 
            justify-content: center;
            align-items: center;
            margin-bottom: 8.5rem; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .auth-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* input bonitinho */
        .auth-input {
            width: 100%;
            background-color: #c5e1a5; 
            border: none;
            border-radius: 30px;
            padding: 1.2rem 1.5rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: #1a3c2a;
            font-weight: 500;
        }

        .auth-input::placeholder {
            color: #7cb342;
            font-weight: 600;
        }

        .auth-input:focus {
            outline: 2px solid #ffffff;
        }

        /* Botão principal */
        .auth-btn {
            width: 100%;
            background-color: #dcedc8;
            color: #8bc34a;
            border: none;
            border-radius: 30px;
            padding: 1.2rem 1.5rem;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .auth-btn:hover {
            background-color: #f1f8e9;
        }

        .auth-btn:active {
            transform: scale(0.98);
        }

        /* Texto de rodapé para trocar entre login e criar conta */
        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #ffffff;
        }

        .auth-switch a {
            color: #18864b;
            font-weight: 700;
            text-decoration: underline;
            cursor: pointer;
        }
        
        /* Ajuste fino para a mensagem de erro */
        .error-feedback {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            border-left: 4px solid #d32f2f;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>
<body class="home-body">

    <div class="mobile-simulator">
        <div class="mobile-content auth-mobile-bg">
            
            <div class="auth-logo-wrapper">
                <img src="{% static 'IMG/logo.png' %}" alt="GekkoTeca Logo" class="auth-logo">
            </div>

            <div id="login-section" style="width: 100%;">
                <div id="login-error" class="error-feedback hidden"></div>

                <form id="login-form" class="auth-form">
                    <input type="email" id="login-email" class="auth-input" placeholder="E-MAIL" required>
                    <input type="password" id="login-senha" class="auth-input" placeholder="SENHA" required>
                    <button type="submit" class="auth-btn">ENTRAR</button>
                </form>
                
                <div class="auth-switch">
                    Ainda não possui conta? <a id="link-to-register">Crie agora</a>
                </div>
            </div>

            <div id="register-section" class="hidden" style="width: 100%;">
                <div id="register-error" class="error-feedback hidden"></div>

                <form id="register-form" class="auth-form">
                    <input type="email" id="reg-email" class="auth-input" placeholder="E-MAIL" required>
                    <input type="password" id="reg-senha" class="auth-input" placeholder="SENHA" required minlength="6">
                    <input type="password" id="reg-senha-confirma" class="auth-input" placeholder="CONFIRMAR SENHA" required>
                    <button type="submit" class="auth-btn">CRIAR CONTA</button>
                </form>
                
                <div class="auth-switch">
                    Possui conta? <a id="link-to-login">Entrar na sua conta</a>
                </div>
            </div>

        </div>
    </div>

    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
