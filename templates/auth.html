{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GekkoTeca - Acesso</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <main class="auth-wrapper">
        <div class="auth-card">
            
            <header class="auth-header-center">
                <img src="{% static 'IMG/treecko.png' %}" alt="Logo GekkoTeca" class="main-logo">
            </header>

            <div id="login-section">
                <div id="login-error" class="error-feedback hidden"></div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-senha">Senha</label>
                        <div class="input-group-password">
                            <input type="password" id="login-senha" required>
                            <button type="button" class="toggle-password">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.67 8.55 \
                                    7.3 12a1 1.012 1.012 0 0 1 0 .644c1.634 3.772 5.266 3.772 9.964 0a1.012 1.012 0 0 1 0-.644" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-solid">Entrar</button>
                </form>
                <p class="switch-link">Não tem uma conta? <a href="#" id="link-to-register">Cadastre-se</a></p>
            </div>

            <div id="register-section" class="hidden">
                <div id="register-error" class="error-feedback hidden"></div>

                <form id="register-form">
                    <div class="form-group">
                        <label for="reg-email">Email</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-senha">Senha</label>
                        <div class="input-group-password">
                            <input type="password" id="reg-senha" required minlength="6">
                            <button type="button" class="toggle-password">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.67 8.55 \
                                    7.3 12a1 1.012 1.012 0 0 1 0 .644c1.634 3.772 5.266 3.772 9.964 0a1.012 1.012 0 0 1 0-.644" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-senha-confirma">Repetir Senha</label>
                        <div class="input-group-password">
                            <input type="password" id="reg-senha-confirma" required>
                            <button type="button" class="toggle-password">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.67 8.55 \
                                    7.3 12a1 1.012 1.012 0 0 1 0 .644c1.634 3.772 5.266 3.772 9.964 0a1.012 1.012 0 0 1 0-.644" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-solid">Criar Conta</button>
                </form>
                <p class="switch-link">Já tem uma conta? <a href="#" id="link-to-login">Entrar</a></p>
            </div>

        </div>
    </main>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
